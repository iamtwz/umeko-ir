name: Flutter CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Analyze and test
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: web
            os: ubuntu-latest
            package_suffix: web.tar.gz
          - target: macos
            os: macos-latest
            package_suffix: macos.zip
          - target: linux
            os: ubuntu-latest
            package_suffix: linux-x64.tar.gz
          - target: windows
            os: windows-2022
            package_suffix: windows-x64.zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: '17'
      - name: Install macOS build dependencies
        if: matrix.target == 'macos'
        run: brew install autoconf automake libtool pkg-config
      - name: Install Linux build dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            libblkid-dev \
            liblzma-dev \
            libcurl4-openssl-dev \
            libssl-dev \
            zlib1g-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Resolve build channel
        id: build-channel
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "channel=release" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "suffix=-dev" >> "$GITHUB_OUTPUT"
          fi
      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          dart_define="--dart-define=UMEKO_BUILD_CHANNEL=${{ steps.build-channel.outputs.channel }}"
          case "${{ matrix.target }}" in
            macos)
              flutter build macos --release "$dart_define"
              if [[ "${{ steps.build-channel.outputs.channel }}" == "dev" ]]; then
                plutil -replace CFBundleDisplayName -string "Umeko IR Dev" "build/macos/Build/Products/Release/Umeko IR.app/Contents/Info.plist"
                plutil -replace CFBundleName -string "Umeko IR Dev" "build/macos/Build/Products/Release/Umeko IR.app/Contents/Info.plist"
                mv "build/macos/Build/Products/Release/Umeko IR.app" "build/macos/Build/Products/Release/Umeko IR Dev.app"
              fi
              ;;
            linux)
              if [[ "${{ steps.build-channel.outputs.channel }}" == "dev" ]]; then
                sed -i 's/"Umeko IR"/"Umeko IR Dev"/g' linux/runner/my_application.cc
              fi
              flutter build linux --release "$dart_define"
              ;;
            windows)
              if [[ "${{ steps.build-channel.outputs.channel }}" == "dev" ]]; then
                sed -i 's/L"Umeko IR"/L"Umeko IR Dev"/g' windows/runner/main.cpp
              fi
              flutter build windows --release "$dart_define"
              ;;
            web)
              flutter build web --release "$dart_define"
              if [[ "${{ steps.build-channel.outputs.channel }}" == "dev" ]]; then
                sed -i 's/>Umeko IR</>Umeko IR Dev</g; s/content="Umeko IR"/content="Umeko IR Dev"/g' build/web/index.html
                sed -i 's/"name": "Umeko IR"/"name": "Umeko IR Dev"/; s/"short_name": "Umeko IR"/"short_name": "Umeko IR Dev"/' build/web/manifest.json
              fi
              ;;
          esac
      - name: Resolve package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../dist
          package="../dist/umeko-ir-${{ steps.package-version.outputs.version }}${{ steps.build-channel.outputs.suffix }}-${{ matrix.package_suffix }}"
          case "${{ matrix.target }}" in
            macos)
              app_name="Umeko IR.app"
              if [[ "${{ steps.build-channel.outputs.channel }}" == "dev" ]]; then
                app_name="Umeko IR Dev.app"
              fi
              ditto -c -k --keepParent "build/macos/Build/Products/Release/$app_name" "$package"
              ;;
            linux)
              tar -czf "$package" -C build/linux/x64/release bundle
              ;;
            windows)
              7z a -tzip "$package" ./build/windows/x64/runner/Release/*
              ;;
            web)
              tar -czf "$package" -C build web
              ;;
          esac
      - uses: actions/upload-artifact@v7
        with:
          name: umeko-ir-${{ steps.package-version.outputs.version }}${{ steps.build-channel.outputs.suffix }}-${{ matrix.package_suffix }}
          path: dist/umeko-ir-${{ steps.package-version.outputs.version }}${{ steps.build-channel.outputs.suffix }}-${{ matrix.package_suffix }}

  build-android:
    name: Build android
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build apk --release --dart-define=UMEKO_BUILD_CHANNEL=dev
      - name: Resolve package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "../dist/umeko-ir-${{ steps.package-version.outputs.version }}-dev-android-universal.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: umeko-ir-${{ steps.package-version.outputs.version }}-dev-android-universal.apk
          path: dist/umeko-ir-${{ steps.package-version.outputs.version }}-dev-android-universal.apk

  build-android-release:
    name: Build signed android
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Configure Android release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          keystore_path="$RUNNER_TEMP/umeko-ir-upload.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"
      - run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          flutter build apk --release --dart-define=UMEKO_BUILD_CHANNEL=release
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Resolve package version
        id: package-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "../dist/umeko-ir-${{ steps.package-version.outputs.version }}-android-universal.apk"
      - uses: actions/upload-artifact@v7
        with:
          name: umeko-ir-${{ steps.package-version.outputs.version }}-android-universal.apk
          path: dist/umeko-ir-${{ steps.package-version.outputs.version }}-android-universal.apk

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-android-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
